# Explicit project name so this stack does not collide with other repos that also use
# infra/docker/*.yml (Compose otherwise defaults the project to "docker").
name: pagesai

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pagesai
      POSTGRES_PASSWORD: pagesai
      POSTGRES_DB: pagesai
    ports:
      - "5433:5432"
    volumes:
      - pagesai_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pagesai
      MINIO_ROOT_PASSWORD: pagesai-pagesai
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - pagesai_minio:/data

volumes:
  pagesai_pg:
  pagesai_minio:
