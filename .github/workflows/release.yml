name: Release PagesAI sidecar

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, without leading v"
        required: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish server image
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION#v}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/${OWNER_LC}/pages-ai-server:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag_ref=ghcr.io/${OWNER_LC}/pages-ai-server:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: |
          pnpm typecheck
          pnpm test
          pnpm run hofos:check
          pnpm run hofos:harness
          pnpm --filter @pagesai/server... build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push @pagesai/server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.server
          push: true
          tags: |
            ${{ steps.version.outputs.image_ref }}
            ${{ steps.version.outputs.image_tag_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


      - name: Build hofOS UI tarball
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          pnpm run build:dist
          test -f "packages/hofos-ui/dist/index.js" || (echo "missing packages/hofos-ui/dist/index.js" && exit 1)
          npm --prefix packages/hofos-ui version --no-git-tag-version --allow-same-version "${VERSION}"
          pnpm --dir packages/hofos-ui pack --pack-destination .
          mv pagesai-hofos-ui-*.tgz "pagesai-ui-${VERSION}.tgz"
          ls -lh "pagesai-ui-${VERSION}.tgz"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "${TAG}" \
            "pagesai-ui-${VERSION}.tgz" \
            --title "${TAG}" \
            --generate-notes

      - name: Dispatch lockfile bump to hofOS
        env:
          GH_TOKEN: ${{ secrets.HOFOS_DISPATCH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          SOURCE_SHA: ${{ github.sha }}
          IMAGE_REF: ${{ steps.version.outputs.image_ref }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "HOFOS_DISPATCH_TOKEN is not set; skipping hofOS dispatch."
            exit 0
          fi
          payload="$(jq -nc \
            --arg version "${VERSION}" \
            --arg tag "${TAG}" \
            --arg source_sha "${SOURCE_SHA}" \
            --arg image_ref "${IMAGE_REF}" \
            '{version: $version, tag: $tag, source_sha: $source_sha, image_ref: $image_ref}')"
          gh api repos/jhoetter/hof-os/dispatches \
            -X POST \
            -f event_type=pagesai-released \
            --raw-field client_payload="${payload}"
